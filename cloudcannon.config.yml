paths:
  static: static
  uploads: static/uploads
timezone: America/New_York
markdown:
  engine: commonmark
  options:
    gfm: true
    linkify: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    breaks: false
    xhtml: false
    attributes: false
    typographer: false
    treat_indentation_as_code: true
_snippets_imports:
  hugo:
    exclude:
      - hugo_instagram
collections_config:
  english:
    path: exampleSite/content/english
    icon: publish
  i18n:
    path: exampleSite/i18n
    icon: iron
